name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry==1.8.2
          poetry config virtualenvs.create false
          poetry install

      - name: Lint with flake8
        run: flake8 app tests

      - name: Type check with mypy
        run: mypy app tests

      - name: Format check with black
        run: black --check app tests

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
        run: |
          python -m pytest --maxfail=1 --disable-warnings -vv tests

  docker_build_and_push:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t jammyjam/mcp-db-query-validator:${{ github.sha }} .
          docker tag jammyjam/mcp-db-query-validator:${{ github.sha }} jammyjam/mcp-db-query-validator:latest

      - name: Push Docker image
        run: |
          docker push jammyjam/mcp-db-query-validator:${{ github.sha }}
          docker push jammyjam/mcp-db-query-validator:latest